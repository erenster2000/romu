name: Release

on:
  push:
    branches: [main]

concurrency: release-${{ github.ref }}

jobs:
  release:
    # Requires the NPM_TOKEN repo secret. With unreleased changesets on main,
    # this opens/updates a "Version Packages" PR; merging that PR publishes.
    # Until the secret exists, the publish step is skipped so the workflow
    # stays green.
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      HAS_NPM_TOKEN: ${{ secrets.NPM_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Create release PR or publish
        if: env.HAS_NPM_TOKEN == 'true'
        uses: changesets/action@v1
        with:
          publish: pnpm changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
